# Test Database Configuration - H2 In-Memory Database
quarkus.datasource.db-kind=h2
quarkus.datasource.username=sa
quarkus.datasource.password=
quarkus.datasource.jdbc.url=jdbc:h2:mem:testdb;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH
quarkus.datasource.jdbc.max-size=8
quarkus.datasource.jdbc.min-size=2

# Hibernate Configuration for Tests
quarkus.hibernate-orm.database.generation=drop-and-create
quarkus.hibernate-orm.log.sql=true
quarkus.hibernate-orm.sql-load-script=import.sql

# Disable dev services in tests
quarkus.datasource.devservices.enabled=false

# OpenAPI Configuration
quarkus.openapi.generator.spec=warehouse-openapi.yaml
quarkus.openapi.generator.base-package=com.warehouse.api

# Test specific logging
quarkus.log.level=INFO
quarkus.log.category."com.fulfilment".level=DEBUG

